<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapım Aşamasında</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #4a90e2, #50e3c2);
            color: #fff;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: fadeIn 2s ease-in-out infinite alternate;
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .loader span {
            width: 20px;
            height: 20px;
            margin: 0 5px;
            background-color: #fff;
            border-radius: 50%;
            animation: bounce 1.5s infinite;
        }

        .loader span:nth-child(2) {
            animation-delay: 0.3s;
        }

        .loader span:nth-child(3) {
            animation-delay: 0.6s;
        }

        p {
            font-size: 1.2rem;
            margin-top: auto;
            margin-bottom: 20px;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0.5;
            }
            to {
                opacity: 1;
            }
        }

        footer {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <h1>Yapım Aşamasında</h1>
    <div class="loader">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <p>Bu site Bayındır Medya tarafından tasarlanmaktadır.</p>
    <footer>&copy; 2025 Bayındır Medya</footer>
</body>
</html>
