<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gazişehir Medikal | Çok Yakında</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --med-red: #D31D1D; /* Logodaki kırmızı tonu */
            --med-dark: #1A1A1A; /* Logodaki siyah/gri tonu */
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: var(--med-dark);
            margin: 0;
            overflow-x: hidden;
        }

        .bg-soft {
            background: radial-gradient(circle at 0% 0%, #fff5f5 0%, #ffffff 50%);
        }

        /* EKG Çizgisi Animasyonu */
        .ekg-line {
            width: 100%;
            height: 100px;
            stroke: var(--med-red);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 4s linear infinite;
            opacity: 0.2;
        }

        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }

        /* Sayaç Kartları */
        .count-box {
            background: #ffffff;
            border-bottom: 4px solid var(--med-red);
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.08);
            border-radius: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .count-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -10px rgba(211, 29, 29, 0.15);
        }

        .number-font {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--med-dark);
            line-height: 1;
        }

        @media (min-width: 768px) {
            .number-font { font-size: 4rem; }
        }

        /* Mobil Optimizasyonları */
        @media (max-width: 640px) {
            .logo-container { max-width: 300px; }
            .count-box { padding: 1.25rem !important; }
            .number-font { font-size: 2.25rem; }
        }
    </style>
</head>
<body class="bg-soft min-h-screen flex flex-col items-center justify-between">

    <!-- Üst Dekoratif EKG Alanı -->
    <div class="w-full overflow-hidden absolute top-0 left-0 pointer-events-none">
        <svg class="ekg-line" viewBox="0 0 1000 100">
            <path d="M0,50 L200,50 L210,40 L220,60 L230,20 L245,80 L255,50 L400,50 L410,30 L425,70 L440,50 L600,50 L615,10 L630,90 L645,50 L1000,50" />
        </svg>
    </div>

    <main class="flex-grow container mx-auto px-4 flex flex-col items-center justify-center py-16 z-10">
        
        <!-- Logo (Ana Başlık Yerine) -->
        <div class="logo-container w-full max-w-lg mb-12 flex justify-center">
            <img src="gazikentlogo (1).png" alt="Gazişehir Medikal" class="w-full h-auto drop-shadow-xl" onerror="this.outerHTML='<h1 class=\'text-4xl md:text-6xl font-black text-center tracking-tighter uppercase\'>GAZİŞEHİR <span class=\'text-[var(--med-red)]\'>MEDİKAL</span></h1>'">
        </div>

        <!-- Slogan Bölümü -->
        <div class="text-center mb-16 px-4">
            <div class="inline-block px-4 py-1 bg-red-50 text-[var(--med-red)] text-[10px] font-bold uppercase tracking-[0.3em] rounded-full mb-6 border border-red-100">
                Dijital Dönüşüm Süreci
            </div>
            <h2 class="text-xl md:text-3xl font-light text-slate-600 leading-relaxed">
                Gazişehir Medikal olarak <span class="text-slate-900 font-bold">yenilenen dijital yüzümüz</span> ile <br class="hidden md:block"> çok yakında sizlerle olacağız.
            </h2>
        </div>

        <!-- Sayaç Izgarası -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 w-full max-w-4xl">
            <div class="count-box p-6 md:p-10 text-center">
                <div id="days" class="number-font">00</div>
                <div class="text-[10px] md:text-xs uppercase tracking-[0.25em] font-bold text-slate-400 mt-3">Gün</div>
            </div>
            <div class="count-box p-6 md:p-10 text-center">
                <div id="hours" class="number-font">00</div>
                <div class="text-[10px] md:text-xs uppercase tracking-[0.25em] font-bold text-slate-400 mt-3">Saat</div>
            </div>
            <div class="count-box p-6 md:p-10 text-center">
                <div id="minutes" class="number-font">00</div>
                <div class="text-[10px] md:text-xs uppercase tracking-[0.25em] font-bold text-slate-400 mt-3">Dakika</div>
            </div>
            <div class="count-box p-6 md:p-10 text-center">
                <div id="seconds" class="number-font text-[var(--med-red)]">00</div>
                <div class="text-[10px] md:text-xs uppercase tracking-[0.25em] font-bold text-slate-400 mt-3">Saniye</div>
            </div>
        </div>
    </main>

    <!-- Footer ve Çözüm Ortağı İmzası -->
    <footer class="w-full py-12 bg-white border-t border-slate-100 mt-auto">
        <div class="container mx-auto px-6 flex flex-col items-center gap-8">
            
            <div class="flex flex-col items-center gap-2">
                <p class="text-slate-400 text-sm tracking-wide">
                    &copy; 2026 <strong>Gazişehir Medikal San. ve Tic. Ltd. Şti.</strong>
                </p>
                <p class="text-slate-300 text-[11px] uppercase tracking-widest">Sağlığınız İçin Yenileniyoruz</p>
            </div>

            <div class="flex items-center gap-4 py-3 px-6 bg-slate-50 rounded-2xl border border-slate-100 transition-all hover:bg-white hover:shadow-md">
                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Dijital Çözüm Ortağı</span>
                <div class="w-px h-4 bg-slate-200"></div>
                <a href="https://bayindirdijital.com.tr" target="_blank" class="group flex items-center gap-2">
                    <span class="text-slate-800 font-extrabold text-sm group-hover:text-[var(--med-red)] transition-colors">Bayındır Medya</span>
                    <div class="bg-[var(--med-red)] p-1 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </div>
                </a>
            </div>
        </div>
    </footer>

    <script>
        // Hedef Tarih: 20 Mart 2026 Cuma
        const countdownDate = new Date("March 20, 2026 00:00:00").getTime();

        const updateTimer = () => {
            const now = new Date().getTime();
            const diff = countdownDate - now;

            if (diff <= 0) {
                document.querySelectorAll(".number-font").forEach(el => el.innerText = "00");
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        };

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
