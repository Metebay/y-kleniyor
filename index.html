<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gazişehir Medikal | Yakında</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0ea5e9;
            --brand-dark: #020617;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--brand-dark);
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Modern Mesh Arka Plan */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(14, 165, 233, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(56, 189, 248, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* Geri Sayım Kutuları */
        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            padding: 2rem;
            min-width: 140px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--brand-blue), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .stat-card:hover::before {
            transform: translateX(100%);
        }

        .number-glow {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom, #fff 40%, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .label-tech {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--brand-blue);
            margin-top: 0.5rem;
        }

        /* Animasyonlu Tarama Çizgisi */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(14, 165, 233, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 20;
        }

        @media (max-width: 768px) {
            .stat-card { min-width: 100px; padding: 1.25rem; }
            .number-glow { font-size: 2.5rem; }
            .label-tech { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="grid-overlay"></div>
    <div class="scan-line"></div>

    <div class="relative z-10 w-full max-w-6xl px-6 py-12 flex flex-col items-center text-center">
        <!-- Badge -->
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-sky-500/10 border border-sky-500/20 text-sky-400 text-xs font-bold uppercase tracking-widest mb-10 animate-pulse">
            <span class="w-2 h-2 rounded-full bg-sky-500"></span>
            Sistem Güncellemesi Devam Ediyor
        </div>

        <!-- Logo / Title -->
        <div class="mb-12">
            <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter mb-4 text-white">
                Gazişehir<span class="text-sky-500">Medikal</span>
            </h1>
            <p class="text-slate-400 text-lg md:text-2xl max-w-2xl mx-auto font-light leading-relaxed">
                Yenilenen <span class="text-white font-normal underline decoration-sky-500 underline-offset-8">dijital yüzümüz</span> ile çok yakında sizlerle olacağız.
            </p>
        </div>

        <!-- Countdown -->
        <div class="flex flex-wrap justify-center gap-4 md:gap-8 mb-20">
            <div class="stat-card">
                <div id="days" class="number-glow">00</div>
                <div class="label-tech">Gün</div>
            </div>
            <div class="stat-card">
                <div id="hours" class="number-glow">00</div>
                <div class="label-tech">Saat</div>
            </div>
            <div class="stat-card">
                <div id="minutes" class="number-glow">00</div>
                <div class="label-tech">Dakika</div>
            </div>
            <div class="stat-card">
                <div id="seconds" class="number-glow">00</div>
                <div class="label-tech">Saniye</div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="w-full pt-10 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 text-sm text-slate-500">
            <div>
                &copy; 2026 <span class="text-slate-300">Gazişehir Medikal</span>. Tüm hakları saklıdır.
            </div>
            <div class="flex items-center gap-2">
                <span>Dijital Çözüm Ortağı</span>
                <div class="h-4 w-px bg-slate-800"></div>
                <a href="https://bayindirdijital.com.tr" target="_blank" class="text-sky-500 font-bold hover:text-sky-400 transition-all flex items-center gap-1">
                    Bayındır Medya
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </a>
            </div>
        </footer>
    </div>

    <script>
        // Hedef: 20 Mart 2026
        const countdownDate = new Date("March 20, 2026 00:00:00").getTime();

        const updateTimer = () => {
            const now = new Date().getTime();
            const diff = countdownDate - now;

            if (diff < 0) {
                document.getElementById("days").innerText = "00";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        };

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
